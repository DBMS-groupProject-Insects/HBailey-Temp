<!doctype html>
<html lang="en">

    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>

        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- Supabase project URL + anon (public) key -->
        <script>
            window.SUPABASE_URL = "https://vhnvelhpfggxmdjncjuw.supabase.co";
            window.SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZobnZlbGhwZmdneG1kam5janV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NDI4OTEsImV4cCI6MjA4OTUxODg5MX0.oWPnPOibW-qY-mSlJIS5kJN9vI016of0IyYMVUnAaBA";
        </script>
        <script type="module" src="dist/main.js"></script>
        <title>Wingbeat Database</title>
        <style>
            body { font-family: system-ui, Arial, sans-serif; margin: 0; }
            header { display: flex; gap: 12px; align-items: center; justify-content: space-between; }
            button { padding: 8px 12px; cursor: pointer; }
            .muted { color: #666; }
            .error { color: #b00020; white-space: pre-wrap; }
            ul { padding-left: 18px; }
            li { margin: 8px 0; }
            .card { border: 1px solid #ddd; border-radius: 10px; padding: 12px; margin: 10px 0; }
            .row { display: flex; gap: 10px; flex-wrap: wrap; }
            .pill { font-size: 12px; padding: 2px 8px; border: 1px solid #ddd; border-radius: 999px; }
            pre { background: #f6f8fa; padding: 10px; border-radius: 10px; overflow: auto; }
            body.user .admin { display: none !important; }
        </style>
    </head>
    <body class="user">
        <!-- Navbar -->
        <nav class="navbar navbar-expand-md navbar-dark bg-primary px-3">
            <span class="navbar-brand mb-0 h1"><i class="bi bi-bug me-2"></i>Insect Wingbeat Database</span>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarContent">
                <div class="d-flex align-items-center gap-2 ms-auto">
                <button type="button" class="btn btn-secondary btn-sm admin" data-bs-toggle="modal" data-bs-target="#createInsectModal">
                    Add Insect
                </button>
                <button type="button" id="modeToggleBtn" class="btn btn-outline-light btn-sm">
                    Admin Mode
                </button>
                </div>
            </div>
        </nav>

        <!-- Search and Sort -->
        <div class="d-flex align-items-center justify-content-between p-3 pb-0">
            <div class="input-group" style="width: 260px;">
                <span class="input-group-text"><i class="bi bi-search"></i></span>
                <input type="text" class="form-control form-control-sm" id="searchInput" placeholder="Search by name or frequency..." />
            </div>
            <div class="input-group" style="width: fit-content;">
                <button class="btn btn-outline-secondary btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown" id="sortLabel">
                    Name
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item sort-key-item" href="#" data-sort="name">Name</a></li>
                    <li><a class="dropdown-item sort-key-item" href="#" data-sort="wingbeat">Frequency</a></li>
                </ul>
                <button class="btn btn-outline-secondary btn-sm" id="sortDirBtn">
                    <i class="bi bi-sort-up" id="sortDirIcon"></i>
                </button>
            </div>
        </div>

        <!-- Bug List  -->
        <div class="p-3" id="accordion-container"></div>

        <!-- Create Insect Modal -->
        <div class="modal fade" id="createInsectModal" tabindex="-1" aria-labelledby="createInsectModalLabel" aria-hidden="true">
            <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                <h1 class="modal-title fs-5" id="createInsectModalLabel">Create Insect</h1>
                </div>
                <div class="modal-body">
                <form id="insectForm">
                    <div class="mb-3">
                        <label for="createCommonName" class="form-label">Common Name</label>
                        <input type="text" class="form-control" id="createCommonName" />
                    </div>
                    <div class="mb-3">
                        <label for="createScientificName" class="form-label">Scientific Name</label>
                        <input type="text" class="form-control" id="createScientificName" />
                    </div>
                    <div class="mb-3">
                        <label for="createType" class="form-label">Type</label>
                        <input type="text" class="form-control" id="createType" placeholder="e.g. Beetle, Ant, Fly" />
                    </div>
                    <div class="mb-3">
                        <label for="createLifespan" class="form-label">Lifespan (yrs)</label>
                        <input type="number" class="form-control" id="createLifespan" />
                    </div>
                    <div class="mb-3">
                        <label for="createWingbeat" class="form-label">Frequency (Hz)</label>
                        <input type="number" class="form-control" id="createWingbeat" />
                    </div>
                    <div class="mb-3">
                        <label for="createSize" class="form-label">Size (mm)</label>
                        <input type="number" class="form-control" id="createSize" />
                    </div>
                    <div class="mb-3">
                        <label for="createWingspan" class="form-label">Wingspan (mm)</label>
                        <input type="number" class="form-control" id="createWingspan" />
                    </div>
                    <div class="mb-3">
                        <label for="createColours" class="form-label">Colours</label>
                        <input type="text" class="form-control" id="createColours" placeholder="e.g. black, green" />
                    </div>
                    <div class="mb-3">
                        <label for="createCharacteristics" class="form-label">Characteristics</label>
                        <input type="text" class="form-control" id="createCharacteristics" placeholder="e.g. horns, wings, legs" />
                    </div>
                </form>
                </div>
                <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary" id="saveInsectBtn">Save changes</button>
                </div>
            </div>
            </div>
        </div>
        <!-- Edit Insect Modal -->
        <div class="modal fade" id="editInsectModal" tabindex="-1" aria-labelledby="editInsectModalLabel" aria-hidden="true">
            <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                <h1 class="modal-title fs-5" id="editInsectModalLabel">Edit Insect</h1>
                </div>
                <div class="modal-body">
                <form id="editInsectForm">
                    <input type="hidden" id="editId" />
                    <div class="mb-3">
                        <label for="editCommonName" class="form-label">Common Name</label>
                        <input type="text" class="form-control" id="editCommonName" />
                    </div>
                    <div class="mb-3">
                        <label for="editScientificName" class="form-label">Scientific Name</label>
                        <input type="text" class="form-control" id="editScientificName" />
                    </div>
                    <div class="mb-3">
                        <label for="editType" class="form-label">Type</label>
                        <input type="text" class="form-control" id="editType" placeholder="e.g. Beetle, Ant, Fly" />
                    </div>
                    <div class="mb-3">
                        <label for="editLifespan" class="form-label">Lifespan (yrs)</label>
                        <input type="number" class="form-control" id="editLifespan" />
                    </div>
                    <div class="mb-3">
                        <label for="editWingbeat" class="form-label">Frequency (Hz)</label>
                        <input type="number" class="form-control" id="editWingbeat" />
                    </div>
                    <div class="mb-3">
                        <label for="editSize" class="form-label">Size (mm)</label>
                        <input type="number" class="form-control" id="editSize" />
                    </div>
                    <div class="mb-3">
                        <label for="editWingspan" class="form-label">Wingspan (mm)</label>
                        <input type="number" class="form-control" id="editWingspan" />
                    </div>
                    <div class="mb-3">
                        <label for="editColours" class="form-label">Colours</label>
                        <input type="text" class="form-control" id="editColours" placeholder="e.g. black, green" />
                    </div>
                    <div class="mb-3">
                        <label for="editCharacteristics" class="form-label">Characteristics</label>
                        <input type="text" class="form-control" id="editCharacteristics" placeholder="e.g. horns, wings, legs" />
                    </div>
                </form>
                </div>
                <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary" id="saveEditBtn">Save changes</button>
                </div>
            </div>
            </div>
        </div>
    </body>

</html>
